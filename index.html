<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Node.js Auth Test</title>
    <style>
        body {
            background-color: #1a1b26;
            color: #a9b1d6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            background-color: #24283b;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 350px;
            margin-bottom: 20px;
        }
        h2 { color: #7aa2f7; border-bottom: 1px solid #414868; padding-bottom: 10px; }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #16161e;
            border: 1px solid #414868;
            color: #c0caf5;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            margin-top: 10px;
        }
        .btn-register { background-color: #f7768e; color: #1a1b26; }
        .btn-login { background-color: #73daca; color: #1a1b26; }
        .btn-secret { background-color: #bb9af7; color: #1a1b26; margin-top: 20px; }
        #response {
            margin-top: 20px;
            padding: 10px;
            background: #16161e;
            border-left: 4px solid #7aa2f7;
            width: 350px;
            font-family: monospace;
            word-break: break-all;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Registro / Login</h2>
        <input type="text" id="username" placeholder="Usuario">
        <input type="password" id="password" placeholder="Contraseña">
        
        <button class="btn-register" onclick="handleAuth('sign-up')">Registrar</button>
        <button class="btn-login" onclick="handleAuth('login')">Iniciar Sesión</button>
        
        <button class="btn-secret" onclick="getSecret()">Probar Ruta Protegida</button>
    </div>

    <div id="response">Esperando interacción...</div>

    <script>
        const API_URL = 'http://localhost:3000/api';
        let jwtToken = localStorage.getItem('token') || '';

        const updateStatus = (msg) => {
            document.getElementById('response').innerText = typeof msg === 'object' ? JSON.stringify(msg, null, 2) : msg;
        };

        async function handleAuth(endpoint) {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch(`${API_URL}/${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, password_repeat: password })
                });

                const data = await res.json();
                
                if (data.token) {
                    jwtToken = data.token;
                    localStorage.setItem('token', data.token);
                    updateStatus("Login exitoso. Token guardado.");
                } else {
                    updateStatus(data);
                }
            } catch (err) {
                updateStatus("Error de conexión: " + err.message);
            }
        }

        async function getSecret() {
            if (!jwtToken) return updateStatus("No hay token. Inicia sesión primero.");

            try {
                const res = await fetch(`${API_URL}/secret-route`, {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${jwtToken}` }
                });

                if (res.status === 400 || res.status === 401) {
                    updateStatus("Sesión inválida o expirada.");
                } else {
                    const data = await res.text();
                    updateStatus(data);
                }
            } catch (err) {
                updateStatus("Error: " + err.message);
            }
        }
    </script>
</body>
</html>
